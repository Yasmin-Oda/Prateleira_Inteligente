<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Descubra quanto você deixa de lucrar!!</h1>
    <span>Digite o seu faturamento médio por mês:</span>
    <input type="text" id="id_fat"><br>
    <span>Digite o quanto você paga por pesquisa de campo por mês:</span>
    <input type="text" id="id_publi"><br>
    <button onclick="simular()">Simular</button><br>
    <span id="id_result"></span>
</body>
<script>
    let contador=0;
    let totalCPrat=0;
    let totalCPubli=0;
    let sistema=200;//valor pelo uso do sistema
    let valorPrateleira=5000;//valor do projeto pode mudar
    function simular(){
        contador+=1;
        let faturamento=Number(id_fat.value)
        let publi=Number(id_publi.value)    
        //verifica se tem pesquisaDeCampo
        if(publi>1000){
            //total+faturamento+10%-pesquisa
            totalCPubli=faturamento*1.1+totalCPubli-publi
        }else{
            totalCPubli+=faturamento;
        }
        //Cobra só uma vez pela prateleira
        if(contador==1){
            //faturamento+10%-valorPrateleira
            totalCPrat+=faturamento*1.1-(valorPrateleira+sistema);
        }else{
            //faturamento+10%
            totalCPrat=totalCPrat+faturamento*1.1-sistema;
        }
        //exibição
        id_result.innerHTML=`Valor do mês ${contador}:<br>
         Faturamento:R$${faturamento.toFixed(2)} <br>
        Gastos com pesquisas de campo:R$${publi.toFixed(2)}<br>
        Total de faturamento com pesquisas de campo:R$${totalCPubli.toFixed(2)}<br>
        Total de faturamento com prateleira inteligente:R$${totalCPrat.toFixed(2)}<br>`
    }
</script>
</html>
